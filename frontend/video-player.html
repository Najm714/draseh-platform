<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 مشغل الفيديو - منصة ارتقاء</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- AOS Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        /* ============================================================
           المتغيرات - نفس ألوان الصفحة الرئيسية
           ============================================================ */
        :root {
            --primary: #7C3AED;
            --primary-dark: #6D28D9;
            --primary-light: #8B5CF6;
            --secondary: #EC4899;
            --secondary-dark: #DB2777;
            --accent: #F59E0B;
            --accent-light: #FBBF24;
            --dark: #0F172A;
            --dark-light: #1E293B;
            --light: #F8FAFC;
            --gray: #64748B;
            --white: #FFFFFF;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 20px 60px rgba(124, 58, 237, 0.2);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --radius: 20px;
            --bg-body: #F1F5F9;
            --bg-card: #FFFFFF;
            --text-color: #0F172A;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --gradient-main: linear-gradient(135deg, #7C3AED, #EC4899);
            --gradient-secondary: linear-gradient(135deg, #F59E0B, #EC4899);
            --gold: #F59E0B;
        }

        /* ============================================================
           وضع الظلام
           ============================================================ */
        [data-theme="dark"] {
            --bg-body: #0F172A;
            --bg-card: #1E293B;
            --text-color: #F1F5F9;
            --text-muted: #94A3B8;
            --border-color: #334155;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 20px 60px rgba(124, 58, 237, 0.3);
        }

        /* ============================================================
           الإعدادات العامة
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-body);
            color: var(--text-color);
            transition: var(--transition);
            direction: rtl;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* ============================================================
           شريط التمرير المخصص
           ============================================================ */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-body);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gradient-main);
            border-radius: 10px;
        }

        /* ============================================================
           زر تبديل الوضع
           ============================================================ */
        .theme-toggle {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 999;
            background: var(--bg-card);
            color: var(--text-color);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--primary);
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(20deg);
            box-shadow: var(--shadow-hover);
            background: var(--gradient-main);
            color: #fff;
        }

        /* ============================================================
           زر العودة للأعلى
           ============================================================ */
        .back-to-top {
            position: fixed;
            bottom: 95px;
            left: 30px;
            z-index: 999;
            background: var(--gradient-main);
            color: #fff;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .back-to-top.visible {
            display: flex;
        }

        .back-to-top:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: var(--shadow-hover);
        }

        /* ============================================================
           زر العودة
           ============================================================ */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            color: var(--text-color);
            padding: 10px 22px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: var(--shadow);
            transition: var(--transition);
            width: fit-content;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .back-btn:hover {
            background: var(--gradient-main);
            color: #fff;
            transform: translateX(-5px);
            border-color: var(--primary);
        }

        /* ============================================================
           مشغل الفيديو
           ============================================================ */
        .video-container {
            background: #000000;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            position: relative;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--border-color);
        }

        .video-container video {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
        }

        /* طبقة حماية الفيديو - تمنع النقر بزر الماوس الأيمن */
        .video-protection-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 10;
            cursor: default;
        }

        /* علامة مائية */
        .protection-watermark {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 15;
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 2px;
            pointer-events: none;
            user-select: none;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.3);
            padding: 4px 14px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .protection-watermark i {
            margin-left: 6px;
        }

        /* شاشة التحميل */
        .loading-screen {
            color: #fff;
            text-align: center;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            z-index: 5;
            transition: opacity 0.6s ease;
        }

        .loading-screen.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loading-screen i {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 15px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-screen p {
            font-size: 1.1rem;
            opacity: 0.7;
        }

        .loading-screen .loading-bar {
            width: 200px;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }

        .loading-screen .loading-bar .progress {
            height: 100%;
            width: 0%;
            background: var(--gradient-main);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* شاشة الخطأ */
        .error-screen {
            color: #fff;
            text-align: center;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            z-index: 5;
        }

        .error-screen.show {
            display: flex;
        }

        .error-screen i {
            font-size: 4rem;
            color: #EF4444;
            margin-bottom: 15px;
        }

        .error-screen h3 {
            color: #EF4444;
            margin-bottom: 8px;
        }

        .error-screen p {
            opacity: 0.7;
            font-size: 1rem;
        }

        .error-screen .btn-retry {
            margin-top: 15px;
            background: var(--gradient-main);
            color: #fff;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Cairo', sans-serif;
        }

        .error-screen .btn-retry:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
        }

        /* رسالة منع التحميل */
        .block-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-card);
            color: var(--text-color);
            padding: 30px 40px;
            border-radius: var(--radius);
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            z-index: 9999;
            text-align: center;
            max-width: 400px;
            display: none;
            animation: popUp 0.4s ease;
            border-top: 4px solid #EF4444;
        }

        .block-message.show {
            display: block;
        }

        @keyframes popUp {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .block-message i {
            font-size: 3rem;
            color: #EF4444;
            margin-bottom: 15px;
            display: block;
        }

        .block-message h4 {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .block-message p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .block-message .btn-close-block {
            background: var(--gradient-main);
            color: #fff;
            border: none;
            padding: 8px 25px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: var(--transition);
        }

        .block-message .btn-close-block:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
        }

        .block-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 9998;
        }

        .block-overlay.show {
            display: block;
        }

        /* ============================================================
           معلومات الفيديو
           ============================================================ */
        .video-info {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 30px 35px;
            box-shadow: var(--shadow);
            margin-top: 25px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .video-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-main);
        }

        .video-info h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--text-color);
            margin-bottom: 12px;
        }

        .video-info h1 span {
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .video-info .meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .video-info .meta .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .video-info .meta .badge.subject {
            background: rgba(124, 58, 237, 0.1);
            color: var(--primary);
        }

        .video-info .meta .badge.views {
            background: rgba(236, 72, 153, 0.1);
            color: var(--secondary);
        }

        .video-info .meta .badge.date {
            background: rgba(245, 158, 11, 0.1);
            color: var(--accent);
        }

        .video-info .meta .badge.size {
            background: rgba(16, 185, 129, 0.1);
            color: #10B981;
        }

        .video-info .meta .badge.university {
            background: rgba(59, 130, 246, 0.1);
            color: #3B82F6;
        }

        .video-info .description {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .video-info .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            background: rgba(16, 185, 129, 0.08);
            padding: 6px 18px;
            border-radius: 30px;
            color: #10B981;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        /* ============================================================
           التجاوب
           ============================================================ */
        @media (max-width: 768px) {
            .video-info {
                padding: 20px 22px;
            }
            .video-info h1 {
                font-size: 1.4rem;
            }
            .video-info .meta {
                gap: 10px;
                font-size: 0.85rem;
            }
            .video-info .meta .badge {
                font-size: 0.75rem;
                padding: 3px 10px;
            }
            .block-message {
                padding: 25px 20px;
                max-width: 90%;
            }
            .protection-watermark {
                font-size: 0.6rem;
                bottom: 15px;
                right: 15px;
                padding: 2px 10px;
            }
            .theme-toggle,
            .back-to-top {
                width: 45px;
                height: 45px;
                font-size: 1.2rem;
                bottom: 20px;
                left: 20px;
            }
            .back-to-top {
                bottom: 75px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 12px;
            }
            .back-btn {
                font-size: 0.85rem;
                padding: 8px 16px;
            }
            .video-info h1 {
                font-size: 1.2rem;
            }
            .video-info .meta {
                flex-direction: column;
                gap: 6px;
            }
            .video-info .meta .badge {
                width: fit-content;
            }
            .loading-screen i {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>

    <!-- ====== زر تبديل الوضع ====== -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="تبديل الوضع">
        <i class="fas fa-moon"></i>
    </button>

    <!-- ====== زر العودة للأعلى ====== -->
    <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <i class="fas fa-chevron-up"></i>
    </button>

    <!-- ====== Overlay لمنع الأحداث ====== -->
    <div class="block-overlay" id="blockOverlay"></div>

    <!-- ====== رسالة منع التحميل ====== -->
    <div class="block-message" id="blockMessage">
        <i class="fas fa-lock"></i>
        <h4>🚫 محتوى محمي</h4>
        <p>هذا الفيديو محمي بحقوق النشر. لا يُسمح بالتحميل أو التسجيل أو التقاط لقطات شاشة.</p>
        <button class="btn-close-block" onclick="closeBlockMessage()">
            <i class="fas fa-check"></i> فهمت
        </button>
    </div>

    <div class="container">

        <!-- ====== زر العودة ====== -->
        <a href="explanations.html" class="back-btn" data-aos="fade-up">
            <i class="fas fa-arrow-right"></i> العودة للشروحات
        </a>

        <!-- ====== مشغل الفيديو ====== -->
        <div class="video-container" id="videoContainer" data-aos="fade-up" data-aos-delay="100">
            
            <!-- شاشة التحميل -->
            <div class="loading-screen" id="loadingScreen">
                <i class="fas fa-spinner"></i>
                <p>جاري تحميل الفيديو...</p>
                <div class="loading-bar">
                    <div class="progress" id="loadingProgress"></div>
                </div>
            </div>

            <!-- شاشة الخطأ -->
            <div class="error-screen" id="errorScreen">
                <i class="fas fa-exclamation-circle"></i>
                <h3>حدث خطأ</h3>
                <p id="errorMessage">تعذر تحميل الفيديو</p>
                <button class="btn-retry" onclick="loadVideo()">
                    <i class="fas fa-redo"></i> إعادة المحاولة
                </button>
            </div>

            <!-- عنصر الفيديو -->
            <video id="videoPlayer" controls playsinline preload="metadata" style="width:100%;height:100%;">
                <source id="videoSource" src="" type="video/mp4">
                متصفحك لا يدعم تشغيل الفيديو.
            </video>

            <!-- طبقة الحماية -->
            <div class="video-protection-overlay" id="protectionOverlay"></div>

            <!-- علامة مائية -->
            <div class="protection-watermark">
                <i class="fas fa-shield-alt"></i> محمي بواسطة ارتقاء
            </div>
        </div>

        <!-- ====== معلومات الفيديو ====== -->
        <div class="video-info" id="videoInfo" data-aos="fade-up" data-aos-delay="200">
            <h1><span id="videoTitle">عنوان الفيديو</span></h1>
            <div class="meta">
                <span class="badge subject" id="videoSubject">
                    <i class="fas fa-tag"></i> المادة
                </span>
                <span class="badge university" id="videoUniversity">
                    <i class="fas fa-university"></i> الجامعة
                </span>
                <span class="badge views" id="videoViews">
                    <i class="fas fa-eye"></i> 0 مشاهدة
                </span>
                <span class="badge date" id="videoDate">
                    <i class="fas fa-calendar-alt"></i> -
                </span>
                <span class="badge size" id="videoSize">
                    <i class="fas fa-weight-hanging"></i> -
                </span>
            </div>
            <div class="description" id="videoDescription">
                لا يوجد وصف للفيديو
            </div>
            <div class="security-badge">
                <i class="fas fa-shield-alt"></i>
                هذا الفيديو محمي ضد التحميل والتسجيل والتقاط الشاشة
            </div>
        </div>

    </div>

    <!-- ============================================================
    ====== جافا سكريبت ======
    ============================================================ -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js">
    </script>
    <script>
        // ============================================================
        // تعريف الرابط الأساسي للـ API حسب البيئة
        // ============================================================
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000' 
            : 'https://draseh-platform-1.onrender.com';

        console.log('🌐 API_URL:', API_URL);

        // ============================================================
        // تفعيل AOS
        // ============================================================
        AOS.init({
            duration: 600,
            once: true,
            offset: 50
        });

        // ============================================================
        // تبديل الوضع (Dark/Light)
        // ============================================================
        let isDark = false;

        function toggleTheme() {
            isDark = !isDark;
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            const icon = document.querySelector('.theme-toggle i');
            icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'dark') {
            isDark = true;
            document.documentElement.setAttribute('data-theme', 'dark');
            document.querySelector('.theme-toggle i').className = 'fas fa-sun';
        }

        // ============================================================
        // زر العودة للأعلى
        // ============================================================
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            if (window.scrollY > 500) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        });

        // ============================================================
        // المتغيرات
        // ============================================================
        const params = new URLSearchParams(window.location.search);
        const videoId = params.get('id');

        // ============================================================
        // عرض رسالة المنع
        // ============================================================
        function showBlockMessage(message) {
            const overlay = document.getElementById('blockOverlay');
            const msgBox = document.getElementById('blockMessage');
            const msgText = msgBox.querySelector('p');

            if (message) {
                msgText.textContent = message;
            }

            overlay.classList.add('show');
            msgBox.classList.add('show');

            setTimeout(() => {
                closeBlockMessage();
            }, 3000);
        }

        function closeBlockMessage() {
            document.getElementById('blockOverlay').classList.remove('show');
            document.getElementById('blockMessage').classList.remove('show');
        }

        // ============================================================
        // نظام حماية الفيديو
        // ============================================================
        function setupProtection() {
            const video = document.getElementById('videoPlayer');
            const container = document.getElementById('videoContainer');

            container.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                showBlockMessage('🚫 تم تعطيل القائمة المنبثقة لحماية المحتوى');
                return false;
            });

            container.addEventListener('dragstart', function(e) {
                e.preventDefault();
                showBlockMessage('🚫 لا يُسمح بسحب الفيديو');
                return false;
            });

            document.addEventListener('keydown', function(e) {
                const ctrl = e.ctrlKey || e.metaKey;
                const key = e.key.toLowerCase();

                if (ctrl && ['s', 'u', 'i', 'j', 'p'].includes(key)) {
                    e.preventDefault();
                    showBlockMessage('🚫 لا يُسمح باستخدام اختصارات لوحة المفاتيح');
                    return false;
                }

                if (key === 'f12') {
                    e.preventDefault();
                    showBlockMessage('🚫 لا يُسمح بفتح أدوات المطور');
                    return false;
                }
            });

            document.addEventListener('copy', function(e) {
                e.preventDefault();
                showBlockMessage('🚫 لا يُسمح بنسخ المحتوى');
                return false;
            });

            console.log('🛡️ تم تفعيل نظام حماية الفيديو');
        }

        // ============================================================
        // التحقق من صحة ID الفيديو
        // ============================================================
        function isValidObjectId(id) {
            return /^[0-9a-fA-F]{24}$/.test(id);
        }

        // ============================================================
        // تحميل الفيديو وتشغيله
        // ============================================================
        async function loadVideo() {
            const loadingScreen = document.getElementById('loadingScreen');
            const errorScreen = document.getElementById('errorScreen');
            const videoPlayer = document.getElementById('videoPlayer');
            const videoSource = document.getElementById('videoSource');
            const loadingProgress = document.getElementById('loadingProgress');

            if (!videoId) {
                loadingScreen.classList.add('hide');
                errorScreen.classList.add('show');
                document.getElementById('errorMessage').textContent = 'لم يتم تحديد فيديو';
                return;
            }

            if (!isValidObjectId(videoId)) {
                loadingScreen.classList.add('hide');
                errorScreen.classList.add('show');
                document.getElementById('errorMessage').textContent = 'معرف الفيديو غير صالح';
                console.error('❌ ID غير صالح:', videoId);
                return;
            }

            try {
                console.log('🔍 جاري تحميل الفيديو ID:', videoId);
                
                const response = await fetch(`${API_URL}/api/videos/${videoId}`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('الفيديو غير موجود');
                    }
                    if (response.status === 400) {
                        throw new Error('معرف الفيديو غير صالح');
                    }
                    throw new Error(`خطأ في الخادم: ${response.status}`);
                }

                const data = await response.json();
                console.log('📦 بيانات الفيديو:', data);

                if (data.success && data.data) {
                    const video = data.data;
                    
                    // تحديث معلومات الفيديو
                    document.getElementById('videoTitle').textContent = video.title || 'بدون عنوان';
                    document.getElementById('videoSubject').innerHTML = `<i class="fas fa-tag"></i> ${video.subjectName || 'مادة'}`;
                    document.getElementById('videoUniversity').innerHTML = `<i class="fas fa-university"></i> ${video.universityName || 'جامعة'}`;
                    document.getElementById('videoViews').innerHTML = `<i class="fas fa-eye"></i> ${video.views || 0} مشاهدة`;
                    document.getElementById('videoDate').innerHTML = `<i class="fas fa-calendar-alt"></i> ${video.uploadDate ? new Date(video.uploadDate).toLocaleDateString('ar-SA') : '-'}`;
                    document.getElementById('videoSize').innerHTML = `<i class="fas fa-weight-hanging"></i> ${video.fileSize || 'غير محدد'}`;
                    document.getElementById('videoDescription').textContent = video.description || 'لا يوجد وصف للفيديو';

                    // ✅ بناء رابط الفيديو - باستخدام fileName فقط
                    let videoUrl = '';
                    
                    console.log('📁 بيانات الملف:', {
                        fileName: video.fileName,
                        filePath: video.filePath
                    });

                    // ✅ الطريقة الصحيحة: استخدام fileName
                    if (video.fileName) {
                        videoUrl = `${API_URL}/uploads/videos/${video.fileName}`;
                        console.log('✅ باستخدام fileName:', videoUrl);
                    } 
                    // ✅ في حال عدم وجود fileName، استخدم filePath
                    else if (video.filePath) {
                        // استخراج اسم الملف من المسار
                        let fileName = video.filePath.split('/').pop().split('\\').pop();
                        if (fileName) {
                            videoUrl = `${API_URL}/uploads/videos/${fileName}`;
                            console.log('✅ باستخدام filePath:', videoUrl);
                        }
                    } else {
                        throw new Error('لا يمكن تحديد مسار الفيديو');
                    }

                    console.log('🎬 الرابط النهائي للفيديو:', videoUrl);

                    // تعيين مصدر الفيديو
                    videoSource.src = videoUrl;
                    videoPlayer.load();

                    // مراقبة حالة التحميل
                    let progressInterval = setInterval(() => {
                        const buffered = videoPlayer.buffered;
                        if (buffered.length > 0) {
                            const progress = (buffered.end(0) / videoPlayer.duration) * 100;
                            loadingProgress.style.width = Math.min(progress, 100) + '%';
                            if (progress >= 100) {
                                clearInterval(progressInterval);
                            }
                        }
                    }, 500);

                    videoPlayer.addEventListener('loadedmetadata', function() {
                        console.log('✅ تم تحميل بيانات الفيديو بنجاح');
                        loadingScreen.classList.add('hide');
                        loadingProgress.style.width = '100%';
                        clearInterval(progressInterval);
                    });

                    videoPlayer.addEventListener('canplay', function() {
                        console.log('✅ الفيديو جاهز للتشغيل');
                        loadingScreen.classList.add('hide');
                        loadingProgress.style.width = '100%';
                        clearInterval(progressInterval);
                    });

                    videoPlayer.addEventListener('error', function(e) {
                        console.error('❌ خطأ في تشغيل الفيديو:', e);
                        loadingScreen.classList.add('hide');
                        errorScreen.classList.add('show');
                        document.getElementById('errorMessage').textContent = 
                            `تعذر تشغيل الفيديو. يرجى التأكد من أن الملف موجود.`;
                        clearInterval(progressInterval);
                    });

                    // محاولة تشغيل الفيديو تلقائياً
                    setTimeout(() => {
                        videoPlayer.play().catch(err => {
                            console.log('⚠️ التشغيل التلقائي غير مسموح:', err);
                        });
                    }, 500);

                    // تحديث عدد المشاهدات
                    try {
                        await fetch(`${API_URL}/api/videos/${videoId}/views`, {
                            method: 'PUT'
                        });
                        console.log('✅ تم تحديث عدد المشاهدات');
                    } catch (viewError) {
                        console.warn('⚠️ خطأ في تحديث المشاهدات:', viewError);
                    }

                    // تفعيل نظام الحماية
                    setTimeout(setupProtection, 1000);

                } else {
                    loadingScreen.classList.add('hide');
                    errorScreen.classList.add('show');
                    document.getElementById('errorMessage').textContent = data.message || 'فيديو غير موجود';
                }
            } catch (error) {
                console.error('❌ خطأ في تحميل الفيديو:', error);
                loadingScreen.classList.add('hide');
                errorScreen.classList.add('show');
                document.getElementById('errorMessage').textContent = error.message || 'حدث خطأ في تحميل الفيديو';
            }
        }

        // ============================================================
        // تشغيل التطبيق
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🎬 تم تحميل مشغل الفيديو مع نظام حماية متقدم');
            console.log('🛡️ الفيديو محمي ضد التحميل والتسجيل والتقاط الشاشة');
            console.log('🌐 API_URL:', API_URL);
            console.log('📹 Video ID:', videoId);
            loadVideo();
        });

        // ============================================================
        // جعل الدوال متاحة عالمياً
        // ============================================================
        window.loadVideo = loadVideo;
        window.closeBlockMessage = closeBlockMessage;
        window.toggleTheme = toggleTheme;
    </script>

</body>
</html>
