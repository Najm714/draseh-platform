<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📚 الشروحات الأكاديمية - منصة ارتقاء</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <style>
        /* ============================================================
           المتغيرات - نفس ألوان الصفحة الرئيسية
           ============================================================ */
        :root {
            --primary: #7C3AED;
            --primary-dark: #6D28D9;
            --primary-light: #8B5CF6;
            --secondary: #EC4899;
            --secondary-dark: #DB2777;
            --accent: #F59E0B;
            --accent-light: #FBBF24;
            --dark: #0F172A;
            --dark-light: #1E293B;
            --light: #F8FAFC;
            --gray: #64748B;
            --white: #FFFFFF;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 20px 60px rgba(124, 58, 237, 0.2);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --radius: 20px;
            --bg-body: #F1F5F9;
            --bg-card: #FFFFFF;
            --text-color: #0F172A;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --gradient-main: linear-gradient(135deg, #7C3AED, #EC4899);
            --gradient-secondary: linear-gradient(135deg, #F59E0B, #EC4899);
            --gold: #F59E0B;
        }

        /* ============================================================
           وضع الظلام
           ============================================================ */
        [data-theme="dark"] {
            --bg-body: #0F172A;
            --bg-card: #1E293B;
            --text-color: #F1F5F9;
            --text-muted: #94A3B8;
            --border-color: #334155;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 20px 60px rgba(124, 58, 237, 0.3);
        }

        /* ============================================================
           الإعدادات العامة
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-body);
            color: var(--text-color);
            transition: var(--transition);
            direction: rtl;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 25px;
        }

        /* ============================================================
           شريط التمرير المخصص
           ============================================================ */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-body);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gradient-main);
            border-radius: 10px;
        }

        /* ============================================================
           الهيدر
           ============================================================ */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 15px 25px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            background: var(--gradient-main);
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .logo-text {
            font-size: 26px;
            font-weight: 900;
            color: var(--text-color);
            letter-spacing: -0.5px;
        }

        .logo-text span {
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .header-actions .btn-back {
            background: var(--bg-body);
            color: var(--text-color);
            padding: 8px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            border: 1px solid var(--border-color);
        }

        .header-actions .btn-back:hover {
            background: var(--gradient-main);
            color: #fff;
            transform: translateY(-2px);
        }

        .header-actions .btn-admin {
            background: var(--gradient-secondary);
            color: #fff;
            padding: 8px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .header-actions .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.3);
        }

        /* ============================================================
           زر تبديل الوضع
           ============================================================ */
        .theme-toggle {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 999;
            background: var(--bg-card);
            color: var(--text-color);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--primary);
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(20deg);
            box-shadow: var(--shadow-hover);
            background: var(--gradient-main);
            color: #fff;
        }

        /* ============================================================
           زر العودة للأعلى
           ============================================================ */
        .back-to-top {
            position: fixed;
            bottom: 95px;
            left: 30px;
            z-index: 999;
            background: var(--gradient-main);
            color: #fff;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .back-to-top.visible {
            display: flex;
        }

        .back-to-top:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: var(--shadow-hover);
        }

        /* ============================================================
           التنقل بين الجامعات
           ============================================================ */
        .universities-nav {
            background: var(--bg-card);
            padding: 15px 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 15px;
            overflow-x: auto;
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
            scrollbar-width: thin;
            border: 1px solid var(--border-color);
        }

        .universities-nav::-webkit-scrollbar {
            height: 4px;
        }
        .universities-nav::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .uni-btn {
            background: var(--bg-body);
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            font-family: 'Cairo', sans-serif;
            border: 1px solid transparent;
        }

        .uni-btn i {
            font-size: 16px;
            color: var(--text-muted);
        }

        .uni-btn:hover {
            background: var(--border-color);
            transform: translateY(-2px);
        }

        .uni-btn.active {
            background: var(--gradient-main);
            color: #fff;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
            border-color: var(--primary);
        }

        .uni-btn.active i {
            color: #fff;
        }

        .uni-btn .badge {
            background: var(--bg-card);
            color: var(--text-muted);
            padding: 0 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .uni-btn.active .badge {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        /* ============================================================
           التنقل بين التخصصات
           ============================================================ */
        .specialties-nav {
            background: var(--bg-card);
            padding: 12px 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            overflow-x: auto;
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
            scrollbar-width: thin;
            border: 1px solid var(--border-color);
            min-height: 55px;
            align-items: center;
        }

        .specialties-nav::-webkit-scrollbar {
            height: 4px;
        }
        .specialties-nav::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .spec-btn {
            background: var(--bg-body);
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-color);
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            font-family: 'Cairo', sans-serif;
            border: 1px solid transparent;
        }

        .spec-btn i {
            font-size: 14px;
        }

        .spec-btn:hover {
            background: var(--border-color);
            transform: translateY(-2px);
        }

        .spec-btn.active {
            background: var(--gradient-secondary);
            color: #fff;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }

        .spec-btn.active i {
            color: #fff;
        }

        /* ============================================================
           لوحة البحث والفلتر
           ============================================================ */
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 18px 25px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            gap: 15px;
            border: 1px solid var(--border-color);
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-body);
            border-radius: 40px;
            padding: 8px 20px;
            flex: 1;
            min-width: 220px;
            border: 2px solid transparent;
            transition: var(--transition);
        }

        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        }

        .search-box i {
            color: var(--text-muted);
            margin-left: 12px;
        }

        .search-box input {
            border: none;
            background: transparent;
            padding: 10px 0;
            width: 100%;
            font-size: 16px;
            outline: none;
            font-family: 'Cairo', sans-serif;
            color: var(--text-color);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .subject-counter {
            font-size: 14px;
            color: var(--text-muted);
            background: var(--bg-body);
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 600;
        }

        /* ============================================================
           شبكة البطاقات - تصميم جديد
           ============================================================ */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 28px;
            margin-top: 10px;
        }

        .subject-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .subject-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-main);
        }

        .subject-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-light);
        }

        .card-header {
            padding: 20px 22px 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-header .subject-code {
            font-size: 13px;
            color: var(--gold);
            background: #fef9e7;
            padding: 2px 14px;
            border-radius: 30px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .card-header .subject-icon {
            font-size: 2.5rem;
            width: 55px;
            height: 55px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(124, 58, 237, 0.1);
            color: var(--primary);
        }

        .card-body {
            padding: 0 22px 18px;
            flex: 1;
        }

        .card-body h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .card-body .instructor {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .card-body .instructor i {
            margin-left: 6px;
            color: var(--primary);
        }

        .card-body p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            padding: 15px 22px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card-footer .stats {
            display: flex;
            gap: 18px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .card-footer .stats i {
            margin-left: 5px;
        }

        .card-footer .stats .video-count {
            color: var(--secondary);
            font-weight: 600;
        }

        .btn-detail {
            background: var(--gradient-main);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cairo', sans-serif;
        }

        .btn-detail:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(124, 58, 237, 0.3);
        }

        .btn-detail.gold {
            background: var(--gradient-secondary);
        }

        .btn-detail.gold:hover {
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.3);
        }

        /* ============================================================
           حالة عدم وجود نتائج
           ============================================================ */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            font-size: 18px;
        }

        .no-results i {
            font-size: 50px;
            display: block;
            margin-bottom: 15px;
            color: var(--border-color);
        }

        /* ============================================================
           التجاوب
           ============================================================ */
        @media (max-width: 768px) {
            .main-header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .logo-area {
                justify-content: center;
            }
            .header-actions {
                justify-content: center;
            }
            .control-panel {
                flex-direction: column;
            }
            .subjects-grid {
                grid-template-columns: 1fr;
            }
            .universities-nav {
                padding: 10px 15px;
            }
            .uni-btn {
                padding: 8px 14px;
                font-size: 13px;
            }
            .specialties-nav {
                padding: 10px 15px;
                min-height: 45px;
            }
            .spec-btn {
                padding: 6px 14px;
                font-size: 12px;
            }
            .theme-toggle,
            .back-to-top {
                width: 45px;
                height: 45px;
                font-size: 1.2rem;
                bottom: 20px;
                left: 20px;
            }
            .back-to-top {
                bottom: 75px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 12px 15px;
            }
            .main-header {
                padding: 12px 15px;
            }
            .logo-text {
                font-size: 20px;
            }
            .logo-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            .card-body h3 {
                font-size: 18px;
            }
            .card-footer {
                flex-direction: column;
                align-items: stretch;
            }
            .card-footer .stats {
                justify-content: center;
            }
            .btn-detail {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- ====== زر تبديل الوضع ====== -->

        <i class="fas fa-moon"></i>
    </button>

    <!-- ====== زر العودة للأعلى ====== -->
    <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">

            </div>
        </header>

        <!-- ============================================================
        شريط الجامعات
        ============================================================ -->
        <nav class="universities-nav" id="universitiesNav">

        </nav>

        <!-- ============================================================

        ============================================================ -->
        <nav class="specialties-nav" id="specialtiesNav">

        <div class="control-panel">

        // ============================================================
        // 2. استدعاء العناصر من DOM
        // ============================================================
        const grid = document.getElementById('subjectsGrid');
        const searchInput = document.getElementById('searchInput');
        const universitiesNav = document.getElementById('universitiesNav');
        const specialtiesNav = document.getElementById('specialtiesNav');
        const subjectCounter = document.getElementById('subjectCounter');

        // ============================================================
        // 3. حالة التطبيق
        // ============================================================
        let currentUniversity = 'ksu';
        let currentSpecialty = null;
        let currentSubjects = [];
        let videoCounts = {};

        // ============================================================
        // 4. عرض الجامعات
        // ============================================================
        function renderUniversities() {
            let html = '';
            universitiesData.forEach(uni => {
                const totalSubjects = uni.specialties.reduce((acc, spec) => acc + spec.subjects.length, 0);
                html += `
                    <button class="uni-btn ${uni.id === currentUniversity ? 'active' : ''}" 
                            data-university="${uni.id}">
                        <i class="fas ${uni.icon}"></i> ${uni.name}
                        <span class="badge">${totalSubjects}</span>
                    </button>
                `;
            });
            universitiesNav.innerHTML = html;

            document.querySelectorAll('.uni-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const uniId = this.dataset.university;
                    currentUniversity = uniId;
                    currentSpecialty = null;
                    renderUniversities();
                    renderSpecialties(uniId);
                    loadSubjects(uniId, null);
                    searchInput.value = '';
                });
            });
        }

        // ============================================================
        // 5. عرض التخصصات
        // ============================================================
        function renderSpecialties(uniId) {
            const university = universitiesData.find(u => u.id === uniId);
            if (!university) {
                specialtiesNav.innerHTML = '';
                return;
            }

            let html = '';
            // زر "جميع التخصصات"
            html += `
                <button class="spec-btn ${!currentSpecialty ? 'active' : ''}" 
                        data-specialty="all" 
                        onclick="selectSpecialty('${uniId}', null)">
                    <i class="fas fa-th-list"></i> جميع التخصصات
                </button>
            `;
            
            university.specialties.forEach(spec => {
                const isActive = currentSpecialty === spec.id;
                html += `
                    <button class="spec-btn ${isActive ? 'active' : ''}" 
                            data-specialty="${spec.id}"
                            onclick="selectSpecialty('${uniId}', '${spec.id}')">
                        <i class="fas ${spec.icon}"></i> ${spec.name}
                        <span style="font-size:11px; background:rgba(255,255,255,0.2); padding:0 8px; border-radius:12px; color:var(--text-muted);">
                            ${spec.subjects.length}
                        </span>
                    </button>
                `;
            });
            specialtiesNav.innerHTML = html;
        }

        // ============================================================
        // 6. اختيار التخصص (دالة عامة يمكن استدعاؤها من onclick)
        // ============================================================
        function selectSpecialty(uniId, specId) {
            currentSpecialty = specId;
            // إعادة عرض التخصصات لتحديث الـ active
            renderSpecialties(uniId);
            // تحميل المواد حسب التخصص المختار
            loadSubjects(uniId, specId);
            searchInput.value = '';
        }

        // ============================================================
        // 7. جلب عدد الفيديوهات لكل مادة
        // ============================================================
        async function getVideoCount(subjectId) {
            try {
                const response = await fetch(`http://localhost:5000/api/videos/subject/${subjectId}`);
                const data = await response.json();
                return data.count || 0;
            } catch (error) {
                console.error('خطأ في جلب عدد الفيديوهات:', error);
                return 0;
            }
        }

        async function loadAllVideoCounts(subjects) {
            for (const subject of subjects) {
                const count = await getVideoCount(subject.id);
                videoCounts[subject.id] = count;
            }
        }

        // ============================================================
        // 8. تحميل وعرض المواد - الإصلاح الرئيسي هنا
        // ============================================================
        async function loadSubjects(uniId, specId) {
            const university = universitiesData.find(u => u.id === uniId);
            if (!university) {
                currentSubjects = [];
                renderCards([]);
                return;
            }

            let subjects = [];
            
            // إذا كان التخصص محدداً، خذ المواد من هذا التخصص فقط
            if (specId) {
                const specialty = university.specialties.find(s => s.id === specId);
                if (specialty) {
                    subjects = specialty.subjects;
                }
            } else {
                // وإلا خذ جميع المواد من جميع التخصصات
                university.specialties.forEach(spec => {
                    subjects = subjects.concat(spec.subjects);
                });
            }

            currentSubjects = subjects;
            
            // جلب عدد الفيديوهات لكل مادة
            await loadAllVideoCounts(currentSubjects);
            
            // عرض المواد
            renderCards(currentSubjects);
        }

        // ============================================================
        // 9. الانتقال إلى صفحة فيديوهات المادة
        // ============================================================
        function viewSubjectVideos(subjectId) {
            let subject = null;
            let specialtyName = '';
            let universityName = '';

            for (const uni of universitiesData) {
                for (const spec of uni.specialties) {
                    const found = spec.subjects.find(s => s.id === subjectId);
                    if (found) {
                        subject = found;
                        specialtyName = spec.name;
                        universityName = uni.name;
                        break;
                    }
                }
                if (subject) break;
            }

            if (!subject) {
                alert('❌ لم يتم العثور على المادة');
                return;
            }

            const encodedTitle = encodeURIComponent(subject.title);
            const encodedCode = encodeURIComponent(subject.code);
            const encodedSpecialty = encodeURIComponent(specialtyName);
            const encodedUniversity = encodeURIComponent(universityName);

            window.location.href =
                `subject-videos.html?id=${subjectId}&title=${encodedTitle}&code=${encodedCode}&specialty=${encodedSpecialty}&university=${encodedUniversity}`;
        }

        // ============================================================
        // 10. عرض البطاقات
        // ============================================================
        function renderCards(subjects) {
            if (subjects.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-book-open"></i>
                        لا توجد مواد في هذا التخصص حالياً
                    </div>
                `;
                subjectCounter.textContent = '٠ مادة';
                return;
            }

            let html = '';
            subjects.forEach(s => {
                const videoCount = videoCounts[s.id] || 0;
                const colors = ['#dbeafe', '#fce7f3', '#dcfce7', '#e0f2fe', '#fef3c7', '#f1f5f9', '#fef9e7'];
                const color = colors[s.id % colors.length];

                html += `
                    <div class="subject-card" data-aos="fade-up" data-aos-delay="${(s.id % 5) * 100}">
                        <div class="card-header">
                            <span class="subject-code"><i class="fas fa-tag"></i> ${s.code}</span>
                            <div class="subject-icon" style="background:${color};">
                                <i class="fas ${s.icon}"></i>
                            </div>
                        </div>
                        <div class="card-body">
                            <h3>${s.title}</h3>
                            <div class="instructor">
                                <i class="fas fa-user-graduate"></i> ${s.instructor}
                            </div>
                            <p>${s.description}</p>
                        </div>
                        <div class="card-footer">
                            <div class="stats">
                                <span><i class="fas fa-video"></i> ${s.videos}</span>
                                <span class="video-count"><i class="fas fa-film"></i> ${videoCount}</span>
                            </div>
                            <button class="btn-detail gold" onclick="viewSubjectVideos(${s.id})">
                                <i class="fas fa-play"></i> عرض الشرح
                            </button>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
            subjectCounter.textContent = `${subjects.length} مادة`;

            // تفعيل AOS للبطاقات الجديدة
            if (typeof AOS !== 'undefined') {
                AOS.refresh();
            }
        }

        // ============================================================
        // 11. البحث - الإصلاح هنا أيضاً
        // ============================================================
        function filterBySearch() {
            const term = searchInput.value.trim().toLowerCase();
            
            // إذا كان حقل البحث فارغاً، قم بتحميل المواد حسب التخصص الحالي
            if (!term) {
                loadSubjects(currentUniversity, currentSpecialty);
                return;
            }

            const university = universitiesData.find(u => u.id === currentUniversity);
            if (!university) return;

            let subjects = [];
            
            // جلب المواد حسب التخصص المحدد أو جميع المواد
            if (currentSpecialty) {
                const specialty = university.specialties.find(s => s.id === currentSpecialty);
                if (specialty) {
                    subjects = specialty.subjects;
                }
            } else {
                university.specialties.forEach(spec => {
                    subjects = subjects.concat(spec.subjects);
                });
            }

            // فلترة المواد حسب مصطلح البحث
            const filtered = subjects.filter(s =>
                s.title.toLowerCase().includes(term) ||
                s.code.toLowerCase().includes(term) ||
                s.instructor.toLowerCase().includes(term) ||
                s.description.toLowerCase().includes(term)
            );

            // تحديث الفيديوهات وعرض النتائج
            (async () => {
                await loadAllVideoCounts(filtered);
                renderCards(filtered);
            })();
        }

        searchInput.addEventListener('input', filterBySearch);

        // ============================================================
        // 12. تبديل الوضع (Dark/Light)
        // ============================================================
        let isDark = false;

        function toggleTheme() {
            isDark = !isDark;
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            const icon = document.querySelector('.theme-toggle i');
            icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'dark') {
            isDark = true;
            document.documentElement.setAttribute('data-theme', 'dark');
            document.querySelector('.theme-toggle i').className = 'fas fa-sun';
        }

        // ============================================================
        // 13. زر العودة للأعلى
        // ============================================================
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            if (window.scrollY > 500) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        });

        // ============================================================
        // 14. تفعيل AOS
        // ============================================================
        if (typeof AOS !== 'undefined') {
            AOS.init({
                duration: 800,
                once: true,
                offset: 50
            });
        }

        // ============================================================
        // 15. التشغيل الابتدائي
        // ============================================================
        renderUniversities();
        renderSpecialties('ksu');
        loadSubjects('ksu', null);

        console.log('📚 تم تحميل قسم الشروحات بنجاح!');
        console.log('🏛️ عدد الجامعات:', universitiesData.length);
        const totalSubjects = universitiesData.reduce((acc, uni) => {
            return acc + uni.specialties.reduce((a, spec) => a + spec.subjects.length, 0);
        }, 0);
        console.log('📚 عدد المواد:', totalSubjects);
    </script>
