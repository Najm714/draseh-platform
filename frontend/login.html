<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منصة ارتقاء</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #7C3AED;
            --primary-dark: #6D28D9;
            --secondary: #EC4899;
            --dark: #0F172A;
            --bg-body: #F1F5F9;
            --bg-card: #FFFFFF;
            --text-color: #0F172A;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            --radius: 20px;
            --gradient-main: linear-gradient(135deg, #7C3AED, #EC4899);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-body);
            color: var(--text-color);
            direction: rtl;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            max-width: 440px;
            width: 100%;
            background: var(--bg-card);
            padding: 45px 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--gradient-main);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo .logo-icon {
            font-size: 3rem;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-logo h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--text-color);
            margin-top: 10px;
        }

        .login-logo h1 span {
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-logo p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .form-group label i {
            color: var(--primary);
            margin-left: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: 0.3s;
            background: var(--bg-body);
            color: var(--text-color);
        }

        .form-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--gradient-main);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Cairo', sans-serif;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-msg {
            background: #FEE2E2;
            color: #991B1B;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #FCA5A5;
        }

        .error-msg.show { display: block; }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover { text-decoration: underline; }

        .register-link {
            margin-top: 15px;
            text-align: center;
        }

        .register-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-logo">
            <div class="logo-icon">
                <i class="fas fa-rocket"></i>
            </div>
            <h1>منصة <span>ارتقاء</span></h1>
            <p>تسجيل الدخول إلى حسابك</p>
        </div>

        <div class="error-msg" id="loginError">❌ البريد الإلكتروني أو كلمة المرور غير صحيحة</div>

        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                <input type="email" id="loginEmail" placeholder="admin@drasah.com" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> كلمة المرور</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </button>
        </form>

        <div class="login-footer">
            <i class="fas fa-shield-alt" style="color:var(--primary);"></i>
            بيئة آمنة ومشفرة
        </div>

        <div class="register-link">
            ليس لديك حساب؟ <a href="register.html">سجل الآن</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            errorEl.classList.remove('show');

            if (!email || !password) {
                errorEl.textContent = '❌ يرجى إدخال البريد الإلكتروني وكلمة المرور';
                errorEl.classList.add('show');
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تسجيل الدخول...';
            btn.disabled = true;

            try {
                const API_URL = window.location.hostname === 'localhost' 
                    ? 'http://localhost:5000' 
                    : 'https://draseh-platform-1.onrender.com';

                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    // حفظ بيانات المستخدم
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // التوجيه حسب الدور
                    if (data.user.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else if (data.user.role === 'expert') {
                        window.location.href = 'expert-dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    errorEl.textContent = '❌ ' + (data.message || 'بيانات الدخول غير صحيحة');
                    errorEl.classList.add('show');
                }
            } catch (error) {
                console.error('❌ خطأ:', error);
                errorEl.textContent = '❌ حدث خطأ في الاتصال بالخادم';
                errorEl.classList.add('show');
            } finally {
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
                btn.disabled = false;
            }
        });
    </script>

</body>
</html>
