<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - منصة ارتقاء</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- AOS Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        /* ============================================================
           المتغيرات - نفس ألوان الصفحة الرئيسية
           ============================================================ */
        :root {
            --primary: #7C3AED;
            --primary-dark: #6D28D9;
            --primary-light: #8B5CF6;
            --secondary: #EC4899;
            --secondary-dark: #DB2777;
            --accent: #F59E0B;
            --accent-light: #FBBF24;
            --dark: #0F172A;
            --dark-light: #1E293B;
            --light: #F8FAFC;
            --gray: #64748B;
            --white: #FFFFFF;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 20px 60px rgba(124, 58, 237, 0.2);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --radius: 20px;
            --bg-body: #F1F5F9;
            --bg-card: #FFFFFF;
            --text-color: #0F172A;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --gradient-main: linear-gradient(135deg, #7C3AED, #EC4899);
            --gradient-secondary: linear-gradient(135deg, #F59E0B, #EC4899);
            --gold: #F59E0B;
        }

        /* ============================================================
           وضع الظلام
           ============================================================ */
        [data-theme="dark"] {
            --bg-body: #0F172A;
            --bg-card: #1E293B;
            --text-color: #F1F5F9;
            --text-muted: #94A3B8;
            --border-color: #334155;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 20px 60px rgba(124, 58, 237, 0.3);
        }

        /* ============================================================
           الإعدادات العامة
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-body);
            color: var(--text-color);
            transition: var(--transition);
            direction: rtl;
            overflow-x: hidden;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ============================================================
           شريط التمرير المخصص
           ============================================================ */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-body);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gradient-main);
            border-radius: 10px;
        }

        /* ============================================================
           زر تبديل الوضع
           ============================================================ */
        .theme-toggle {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 999;
            background: var(--bg-card);
            color: var(--text-color);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--primary);
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(20deg);
            box-shadow: var(--shadow-hover);
            background: var(--gradient-main);
            color: #fff;
        }

        /* ============================================================
           زر العودة للأعلى
           ============================================================ */
        .back-to-top {
            position: fixed;
            bottom: 95px;
            left: 30px;
            z-index: 999;
            background: var(--gradient-main);
            color: #fff;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .back-to-top.visible {
            display: flex;
        }

        .back-to-top:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: var(--shadow-hover);
        }

        /* ============================================================
           الهيدر
           ============================================================ */
        .dashboard-header {
            background: var(--bg-card);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
            border-bottom: 3px solid transparent;
            border-image: var(--gradient-main);
            border-image-slice: 1;
            transition: var(--transition);
        }

        .dashboard-header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .logo span {
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo i {
            font-size: 2.2rem;
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(-5deg); }
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-back {
            background: var(--bg-body);
            color: var(--text-color);
            padding: 8px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            border: 1px solid var(--border-color);
        }
        .btn-back:hover {
            background: var(--gradient-main);
            color: #fff;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--gradient-main);
            color: #fff;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-block;
            font-family: 'Cairo', sans-serif;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
        }

        .btn-danger {
            background: #EF4444;
            color: #fff;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Cairo', sans-serif;
        }
        .btn-danger:hover {
            background: #DC2626;
            transform: translateY(-2px);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-body);
            padding: 6px 16px 6px 10px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: var(--gradient-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
        }

        /* ============================================================
           المحتوى الرئيسي
           ============================================================ */
        .dashboard-content {
            padding: 30px 0 60px;
        }

        .dashboard-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
            gap: 15px;
        }

        .dashboard-title h1 {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--text-color);
        }
        .dashboard-title h1 span {
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-title .welcome-badge {
            background: var(--bg-card);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.95rem;
            box-shadow: var(--shadow);
        }

        .dashboard-title .welcome-badge i {
            color: var(--primary);
            margin-left: 8px;
        }

        /* ============================================================
           إحصائيات سريعة
           ============================================================ */
        .quick-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 25px 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
            transition: var(--transition);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-main);
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .stat-card .stat-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 2.8rem;
            font-weight: 900;
            display: block;
            line-height: 1.2;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card .label {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            display: block;
            margin-top: 5px;
        }

        .stat-card .stat-icon { color: var(--primary); }

        /* ============================================================
           رسائل التنبيه
           ============================================================ */
        .alert {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
            animation: slideDown 0.4s ease;
        }

        .alert-success {
            background: #D1FAE5;
            color: #065F46;
            border: 1px solid #A7F3D0;
        }

        .alert-danger {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FCA5A5;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============================================================
           تبويبات الخدمات
           ============================================================ */
        .services-tabs-wrapper {
            background: var(--bg-card);
            padding: 15px 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }

        .services-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: thin;
        }

        .services-tabs::-webkit-scrollbar {
            height: 4px;
        }
        .services-tabs::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            background: var(--bg-body);
            color: var(--text-color);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            white-space: nowrap;
            border: 1px solid transparent;
            flex-shrink: 0;
        }

        .tab-btn:hover {
            background: var(--border-color);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: var(--gradient-main);
            color: #fff;
            box-shadow: 0 5px 15px rgba(124, 58, 237, 0.3);
            border-color: var(--primary);
        }

        .tab-btn i {
            margin-left: 8px;
        }

        /* ============================================================
           بطاقات الخدمات الفرعية
           ============================================================ */
        .sub-services-container {
            margin-bottom: 35px;
        }

        .sub-services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .sub-service-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 25px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .sub-service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-main);
        }

        .sub-service-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-light);
        }

        .sub-service-card .service-icon {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .sub-service-card .service-info {
            flex: 1;
        }

        .sub-service-card .service-info h4 {
            color: var(--text-color);
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .sub-service-card .service-info p {
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .sub-service-card .service-info .service-tag {
            display: inline-block;
            background: rgba(124, 58, 237, 0.1);
            color: var(--primary);
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 8px;
        }

        .sub-service-card .service-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .sub-service-card .service-actions button {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-request-sub {
            background: var(--gradient-main);
            color: #fff;
        }

        .btn-request-sub:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
        }

        .btn-view-models {
            background: var(--gradient-secondary);
            color: #fff;
        }

        .btn-view-models:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.3);
        }

        .btn-request-sub:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ============================================================
           مودال عرض النماذج السابقة
           ============================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: var(--bg-card);
            max-width: 750px;
            width: 100%;
            max-height: 80vh;
            border-radius: var(--radius);
            padding: 35px 30px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: slideUp 0.3s ease;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 1.8rem;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--primary);
            transform: rotate(90deg);
        }

        .modal-box h2 {
            color: var(--text-color);
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .modal-box .modal-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .modal-box .models-list {
            display: grid;
            gap: 12px;
        }

        .modal-box .model-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-body);
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .modal-box .model-item:hover {
            border-color: var(--primary);
            transform: translateX(-3px);
        }

        .modal-box .model-item .model-info {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
        }

        .modal-box .model-item .model-info i {
            font-size: 1.8rem;
            color: var(--primary);
        }

        .modal-box .model-item .model-info .model-details {
            flex: 1;
        }

        .modal-box .model-item .model-info .model-name {
            font-weight: 700;
            color: var(--text-color);
            font-size: 1rem;
        }

        .modal-box .model-item .model-info .model-meta-modal {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .modal-box .model-item .model-info .model-meta-modal .tag-sm {
            font-size: 0.7rem;
            padding: 1px 12px;
            border-radius: 12px;
            background: rgba(124, 58, 237, 0.1);
            color: var(--primary);
        }

        .modal-box .model-item .model-info .model-meta-modal .tag-sm.service-tag-sm {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent);
        }

        .modal-box .model-item .model-info .model-meta-modal .tag-sm.sub-tag-sm {
            background: rgba(236, 72, 153, 0.1);
            color: var(--secondary);
        }

        .modal-box .model-item .btn-view-model-modal {
            background: var(--gradient-secondary);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-box .model-item .btn-view-model-modal:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.3);
        }

        .modal-box .empty-models-modal {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .modal-box .empty-models-modal i {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 15px;
            opacity: 0.2;
        }

        .modal-box .empty-models-modal h4 {
            color: var(--text-color);
            margin-bottom: 5px;
        }

        .modal-box .loading-models {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-muted);
        }

        .modal-box .loading-models i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 15px;
            color: var(--primary);
        }

        /* ============================================================
           قائمة الطلبات
           ============================================================ */
        .orders-section {
            margin-top: 10px;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 25px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .orders-section .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .orders-section .section-title h2 {
            font-size: 1.3rem;
            color: var(--text-color);
        }

        .orders-section .section-title h2 i {
            color: var(--primary);
            margin-left: 10px;
        }

        .orders-section .section-title .order-count {
            background: var(--bg-body);
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .orders-list {
            display: grid;
            gap: 15px;
        }

        .order-card {
            background: var(--bg-body);
            padding: 18px 22px;
            border-radius: 16px;
            border-right: 4px solid var(--primary);
            transition: var(--transition);
            border: 1px solid var(--border-color);
        }

        .order-card:hover {
            transform: translateX(-5px);
            box-shadow: var(--shadow-hover);
        }

        .order-card .order-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            flex-wrap: wrap;
            gap: 10px;
        }

        .order-card .order-header .order-title {
            flex: 1;
        }

        .order-card .order-header .order-title h4 {
            color: var(--text-color);
            font-size: 1.05rem;
            font-weight: 700;
        }

        .order-card .order-header .order-title .order-sub {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .order-card .order-header .status {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
        }

        .status-pending { background: var(--accent); }
        .status-in-progress { background: #3B82F6; }
        .status-completed { background: #10B981; }
        .status-revision { background: #EF4444; }
        .status-cancelled { background: #6B7280; }

        .order-card .order-body {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px 25px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .order-card .order-body span i {
            margin-left: 6px;
            color: var(--primary);
        }

        .order-card .order-files {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #3B82F6;
        }

        .order-card .order-files i {

        .model-card .model-actions {
            display: flex;

            margin-top: 15px;

        .model-card .model-actions button {
            flex: 1;
            padding: 8px 12px;

            border-radius: 10px;

            font-family: 'Cairo', sans-serif;

            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.85rem;
        }

        .model-card .model-actions .btn-download {
            background: var(--primary);
            color: #fff;
        }
        .model-card .model-actions .btn-download:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .model-card .model-actions .btn-view {
            background: var(--gradient-secondary);
            color: #fff;
        }
        .model-card .model-actions .btn-view:hover {

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--text-muted);
            opacity: 0.2;
            margin-bottom: 15px;
            display: block;
        }

        .empty-state h3 {
            color: var(--text-color);

        }

        .empty-models {
            text-align: center;

        }

        .empty-models i {
            font-size: 3rem;

            margin-bottom: 10px;
            opacity: 0.3;
        }

        .loading-text {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .loading-text i {
            font-size: 2rem;
            display: block;
            margin-bottom: 15px;
            color: var(--primary);
        }

        /* ============================================================
           التجاوب
           ============================================================ */

<body>

    <!-- ====== الهيدر ====== -->
    <header class="dashboard-header">

    <main class="dashboard-content">

    <!-- ============================================================
    مودال عرض النماذج السابقة
    ============================================================ -->

        <div class="modal-box">
            <button class="modal-close" onclick="closeModelsModal()">
                <i class="fas fa-times"></i>
            </button>

            <p class="modal-subtitle" id="modalSubtitle">نماذج مرتبطة بهذه الخدمة</p>
            <div class="models-list" id="modalModelsList">
                <!-- سيتم تعبئته بواسطة JavaScript -->
            </div>
        </div>
    </div>

    <!-- ============================================================
    ====== جافا سكريبت ======
    ============================================================ -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js">
    </script>
    <script>
        // ============================================================
        // تفعيل AOS
        // ============================================================
        AOS.init({
            duration: 600,
            once: true,
            offset: 50
        });

        // ============================================================
        // بيانات الخدمات الكاملة (الرئيسية والفرعية)
        // ============================================================
        const SERVICES_DATA = [{
            id: 'statistics',
            icon: 'fa-chart-line',
            title: '📊 التحليل الإحصائي والبحثي',
            subServices: [
                'التحليل الإحصائي للبحوث العلمية والطبية',
                'SPSS – AMOS – Smart PLS',
                'STATA – SAS – E-Views',
                'التحليل الإحصائي النوعي',
                'التحليل التلوي (Meta-Analysis)',
                'النماذج التنبؤية المتقدمة',
                'تفسير النتائج ومناقشتها'
            ]
        }, {
            id: 'proposal',
            icon: 'fa-file-alt',
            title: '🔬 إعداد الخطط والمقترحات البحثية',
            subServices: [
                'إعداد المقترحات والخطط البحثية',
                'اقتراح عناوين الرسائل العلمية',
                'إعداد الإطار النظري والدراسات السابقة',
                'بناء النماذج والتصورات البحثية',
                'إعداد أدوات الدراسة العلمية',
                'تصميم وتحكيم الاستبيانات والاختبارات'
            ]
        }, {
            id: 'literature',
            icon: 'fa-book',
            title: '📚 المراجع والدراسات السابقة',
            subServices: [
                'توفير وجمع المراجع العلمية',
                'تلخيص الدراسات السابقة',
                'توثيق المراجع وفق الأنماط العلمية',
                'تلخيص الكتب والمراجع العربية والإنجليزية',
                'رومنة المراجع',
                'تحليل ورسم الخرائط العلمية'
            ]
        }, {
            id: 'publication',
            icon: 'fa-pen-fancy',
            title: '📝 إعداد وتجهيز الأبحاث للنشر العلمي',
            subServices: [
                'تجهيز الأبحاث وفق متطلبات المجلات المحكمة',
                'ترجمة الأبحاث العلمية',
                'إعادة صياغة الأبحاث وفق المعايير الأكاديمية',
                'التدقيق اللغوي والإملائي المتخصص',
                'تنسيق الأبحاث والرسائل العلمية',
                'فحص التشابه والاقتباس العلمي',
                'ترشيح المجلات العلمية المناسبة للنشر',
                'مراجعة الأبحاث قبل التقديم للمجلات',
                'خدمات التحكيم والمراجعة العلمية'
            ]
        }, {
            id: 'design',
            icon: 'fa-paint-brush',
            title: '🎨 التصميم الأكاديمي والجرافيكس',
            subServices: [
                'تصميم البوسترات البحثية الاحترافية',
                'تصميم بوسترات المؤتمرات العلمية',
                'تصميم العروض التقديمية الاحترافية',
                'تصميم عروض تقديمية ثلاثية الأبعاد (3D)',
                'تصميم الإنفوجرافيك الأكاديمي',
                'تصميم الخرائط الذهنية والمفاهيمية',
                'تصميم الهوية البصرية للمشاريع الأكاديمية',
                'تصميم الملفات التدريبية والحقائب التعليمية'
            ]
        }, {
            id: 'video',
            icon: 'fa-video',
            title: '🎬 إنتاج الفيديو والمحتوى الرقمي',
            subServices: [
                'تصميم فيديوهات تعليمية احترافية',
                'إنتاج فيديوهات بالذكاء الاصطناعي',
                'تصميم الموشن جرافيك الأكاديمي',
                'تصميم الفيديوهات باستخدام برامج Adobe',
                'إعداد المحتوى المرئي للعروض والمؤتمرات',
                'تحويل الأبحاث والمشاريع إلى محتوى مرئي احترافي'
            ]
        }, {
            id: 'consulting',
            icon: 'fa-handshake',
            title: '💼 الاستشارات والخدمات الأكاديمية',
            subServices: [
                'الاستشارات الأكاديمية والبحثية',
                'جلسات استشارية سريعة',
                'خدمة إنقاذ البحث',
                'كتابة السيرة الذاتية (CV)',
                'كتابة خطاب الغرض من الدراسة (SOP)'
            ]
        }, {
            id: 'tutoring',
            icon: 'fa-chalkboard-teacher',
            title: '📖 خدمات الشرح والمراجعة الأكاديمية',
            subServices: [
                'شرح المقررات النظرية والعملية',
                'المراجعات المكثفة قبل الاختبارات',
                'إعداد الملخصات الأكاديمية',
                'إعداد الخرائط الذهنية والمفاهيمية',
                'إعداد بنوك الأسئلة',
                'حل التمارين والواجبات التدريبية',
                'متابعة استفسارات الطلاب',
                'التركيز على النقاط المهمة والمتوقعة للاختبارات'
            ]
        }];

        // ============================================================
        // المتغيرات العامة
        // ============================================================
        let currentToken = localStorage.getItem('token') || '';
        let currentUser = JSON.parse(localStorage.getItem('user') || 'null');
        let currentServiceId = 'statistics';
        let allOrders = [];
        let cachedModels = [];

        // ============================================================
        // تبديل الوضع (Dark/Light)
        // ============================================================
        let isDark = false;

        function toggleTheme() {
            isDark = !isDark;
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            const icon = document.querySelector('.theme-toggle i');
            icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'dark') {
            isDark = true;
            document.documentElement.setAttribute('data-theme', 'dark');
            document.querySelector('.theme-toggle i').className = 'fas fa-sun';
        }

        // ============================================================
        // زر العودة للأعلى
        // ============================================================
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            if (window.scrollY > 500) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        });

        // ============================================================
        // التحقق من تسجيل الدخول
        // ============================================================
        function checkAuth() {
            if (!currentToken || !currentUser) {
                window.location.href = 'index.html';
                return false;
            }
            document.getElementById('userName').textContent = currentUser.name || 'مستخدم';
            document.getElementById('userAvatar').textContent = (currentUser.name || 'م').charAt(0);
            return true;
        }

        // ============================================================
        // تسجيل الخروج
        // ============================================================
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        // ============================================================
        // عرض رسائل التنبيه
        // ============================================================
        function showAlert(message, type = 'success') {
            const alertEl = document.getElementById('alertMessage');
            alertEl.textContent = message;
            alertEl.className = `alert alert-${type} show`;
            setTimeout(() => {
                alertEl.classList.remove('show');
            }, 5000);
        }

        // ============================================================
        // عرض تبويبات الخدمات الرئيسية
        // ============================================================
        function renderTabs() {
            const tabsContainer = document.getElementById('servicesTabs');
            tabsContainer.innerHTML = SERVICES_DATA.map(service => `
                <button class="tab-btn ${service.id === currentServiceId ? 'active' : ''}" 
                        onclick="switchService('${service.id}')">
                    <i class="fas ${service.icon}"></i> ${service.title}
                </button>
            `).join('');
        }

        // ============================================================
        // التبديل بين الخدمات
        // ============================================================
        function switchService(serviceId) {
            currentServiceId = serviceId;
            renderTabs();
            renderSubServices(serviceId);
            document.getElementById('subServicesContainer').scrollIntoView({ behavior: 'smooth' });
        }

        // ============================================================
        // عرض الخدمات الفرعية - مع زر النماذج السابقة
        // ============================================================
        function renderSubServices(serviceId) {
            const grid = document.getElementById('subServicesGrid');
            const service = SERVICES_DATA.find(s => s.id === serviceId);

            if (!service) {
                grid.innerHTML = `<div class="empty-state"><p>لم يتم العثور على الخدمات</p></div>`;
                return;
            }

            grid.innerHTML = service.subServices.map((sub, index) => `
                <div class="sub-service-card" data-aos="fade-up" data-aos-delay="${index * 50}">
                    <div class="service-icon">
                        <i class="fas ${service.icon}"></i>
                    </div>
                    <div class="service-info">
                        <h4>${sub}</h4>
                        <p>خدمة فرعية ضمن ${service.title}</p>
                        <span class="service-tag">${service.title.split(' ')[0]}</span>
                    </div>
                    <div class="service-actions">
                        <button class="btn-request-sub" onclick="requestSubService('${sub}', '${serviceId}')">
                            <i class="fas fa-shopping-cart"></i> طلب الخدمة
                        </button>
                        <button class="btn-view-models" onclick="openModelsModal('${serviceId}')">
                            <i class="fas fa-folder-open"></i> النماذج السابقة
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ============================================================
        // طلب خدمة فرعية
        // ============================================================
        function requestSubService(subServiceName, serviceType) {
            const encodedName = encodeURIComponent(subServiceName);
            const encodedType = encodeURIComponent(serviceType);
            window.location.href = `request-service.html?id=${serviceType}&name=${encodedName}&category=${getCategoryName(serviceType)}`;
        }

        // ============================================================
        // الحصول على اسم الفئة
        // ============================================================
        function getCategoryName(serviceType) {
            const categories = {
                'statistics': 'التحليل الإحصائي والبحثي',
                'proposal': 'إعداد الخطط والمقترحات البحثية',
                'literature': 'المراجع والدراسات السابقة',
                'publication': 'إعداد وتجهيز الأبحاث للنشر العلمي',
                'design': 'التصميم الأكاديمي والجرافيكس',
                'video': 'إنتاج الفيديو والمحتوى الرقمي',
                'consulting': 'الاستشارات والخدمات الأكاديمية',
                'tutoring': 'خدمات الشرح والمراجعة الأكاديمية'
            };
            return categories[serviceType] || 'خدمات أكاديمية';
        }

        // ============================================================
        // جلب النماذج من قاعدة البيانات
        // ============================================================
        async function loadModels() {
            try {
                const response = await fetch('https://draseh-platform-1.onrender.com/api/models');
                const data = await response.json();

                if (data.success && data.data && data.data.length > 0) {
                    cachedModels = data.data;
                    // تخزين في localStorage
                    try {
                        localStorage.setItem('cachedModels', JSON.stringify(cachedModels));
                    } catch (e) {}
                    console.log('✅ تم جلب النماذج من الـ API، العدد:', cachedModels.length);
                    return cachedModels;
                }

                // محاولة جلب من localStorage
                const cached = localStorage.getItem('cachedModels');
                if (cached) {
                    try {
                        const parsed = JSON.parse(cached);
                        if (parsed && parsed.length > 0) {
                            cachedModels = parsed;
                            console.log('✅ تم جلب النماذج من localStorage، العدد:', cachedModels.length);
                            return cachedModels;
                        }
                    } catch (e) {}
                }

                cachedModels = [];
                console.log('ℹ️ لا توجد نماذج');
                return [];
            } catch (error) {
                console.error('❌ خطأ في جلب النماذج:', error);
                // محاولة جلب من localStorage
                const cached = localStorage.getItem('cachedModels');
                if (cached) {
                    try {
                        const parsed = JSON.parse(cached);
                        if (parsed && parsed.length > 0) {
                            cachedModels = parsed;
                            console.log('✅ تم جلب النماذج من localStorage (بعد الخطأ)، العدد:', cachedModels.length);
                            return cachedModels;
                        }
                    } catch (e) {}
                }
                cachedModels = [];
                return [];
            }
        }

        // ============================================================
        // فتح مودال النماذج حسب الخدمة
        // ============================================================
        async function openModelsModal(serviceId) {
            const modal = document.getElementById('modelsModal');
            const title = document.getElementById('modalTitle');
            const subtitle = document.getElementById('modalSubtitle');
            const list = document.getElementById('modalModelsList');

            // عرض حالة التحميل
            list.innerHTML = `
                <div class="loading-models">
                    <i class="fas fa-spinner fa-spin"></i>
                    جاري تحميل النماذج...
                </div>
            `;

            // التأكد من تحميل النماذج
            if (cachedModels.length === 0) {
                await loadModels();
            }

            // الحصول على اسم الخدمة
            const service = SERVICES_DATA.find(s => s.id === serviceId);
            const serviceName = service ? service.title : 'الخدمة';
            
            title.textContent = `📄 نماذج ${serviceName}`;
            subtitle.textContent = 'نماذج سابقة مرتبطة بهذه الخدمة';

            console.log('🔍 البحث عن نماذج للخدمة:', serviceId);
            console.log('📦 جميع النماذج:', cachedModels);

            // فلترة النماذج حسب الخدمة الرئيسية
            const filteredModels = cachedModels.filter(m => m.mainService === serviceId);

            console.log('📊 النماذج المطابقة:', filteredModels.length);

            if (filteredModels.length === 0) {
                list.innerHTML = `
                    <div class="empty-models-modal">
                        <i class="fas fa-file-alt"></i>
                        <h4>لا توجد نماذج سابقة</h4>
                        <p>لا توجد نماذج مرتبطة بهذه الخدمة حالياً</p>
                        <p style="font-size:0.85rem; margin-top:10px;">📤 يمكنك طلب الخدمة للحصول على نموذج جديد</p>
                        <p style="font-size:0.85rem; color:var(--text-muted); margin-top:5px;">
                            💡 تأكد من أن النماذج المرفوعة تحتوي على الخدمة الرئيسية "${serviceId}"
                        </p>
                    </div>
                `;
            } else {
                list.innerHTML = filteredModels.map(model => `
                    <div class="model-item">
                        <div class="model-info">
                            <i class="fas fa-file-pdf"></i>
                            <div class="model-details">
                                <div class="model-name">${model.title}</div>
                                <div class="model-meta-modal">
                                    <span class="tag-sm sub-tag-sm"><i class="fas fa-caret-left"></i> ${model.subService || 'خدمة فرعية'}</span>
                                    <span class="tag-sm">${getCategoryLabel(model.category)}</span>
                                    <span style="font-size:0.75rem; color:var(--text-muted);">📅 ${new Date(model.uploadDate || model.createdAt).toLocaleDateString('ar-SA')}</span>
                                    <span style="font-size:0.75rem; color:var(--text-muted);">📄 ${model.fileSize}</span>
                                </div>
                            </div>
                        </div>
                        <button class="btn-view-model-modal" onclick="viewModelFromModal('${model._id}')">
                            <i class="fas fa-eye"></i> عرض
                        </button>
                    </div>
                `).join('');
            }

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // ============================================================
        // إغلاق المودال
        // ============================================================
        function closeModelsModal() {
            document.getElementById('modelsModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // إغلاق المودال عند الضغط خارج المحتوى
        document.getElementById('modelsModal').addEventListener('click', function(e) {
            if (e.target === this) closeModelsModal();
        });

        // إغلاق المودال بالضغط على Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModelsModal();
        });

        // ============================================================
        // عرض نموذج من المودال
        // ============================================================
        async function viewModelFromModal(id) {
            try {
                const response = await fetch(`http://localhost:5000/api/models/${id}`);
                const data = await response.json();

                if (data.success && data.data.fileData) {
                    window.open(data.data.fileData, '_blank');
                } else {
                    showAlert('❌ تعذر عرض النموذج', 'danger');
                }
            } catch (error) {
                console.error('❌ خطأ:', error);
                showAlert('❌ حدث خطأ في عرض النموذج', 'danger');
            }
        }

        // ============================================================
        // الحصول على اسم الخدمة من المعرف
        // ============================================================
        function getServiceName(serviceId) {
            const services = {
                'statistics': 'التحليل الإحصائي والبحثي',
                'proposal': 'إعداد الخطط والمقترحات البحثية',
                'literature': 'المراجع والدراسات السابقة',
                'publication': 'إعداد وتجهيز الأبحاث للنشر العلمي',
                'design': 'التصميم الأكاديمي والجرافيكس',
                'video': 'إنتاج الفيديو والمحتوى الرقمي',
                'consulting': 'الاستشارات والخدمات الأكاديمية',
                'tutoring': 'خدمات الشرح والمراجعة الأكاديمية'
            };
            return services[serviceId] || serviceId;
        }

        // ============================================================
        // دوال مساعدة للتصنيفات
        // ============================================================
        function getCategoryLabel(category) {
            const labels = {
                'proposal': '📝 مقترحات بحثية',
                'thesis': '🎓 رسائل علمية',
                'survey': '📊 استبيانات',
                'statistics': '📈 تحليل إحصائي',
                'publication': '📰 نشر علمي',
                'other': '📁 أخرى'
            };
            return labels[category] || category;
        }

        // ============================================================
        // جلب النماذج للعميل (في قسم النماذج)
        // ============================================================
        async function loadModelsForClient() {
            const grid = document.getElementById('clientModelsGrid');
            if (!grid) return;

            try {
                const response = await fetch('https://draseh-platform-1.onrender.com/api/models');
                const data = await response.json();

                if (!data.success || !data.data || data.data.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-models">
                            <i class="fas fa-file-alt"></i>
                            <p>لا توجد نماذج متاحة حالياً</p>
                        </div>
                    `;
                    return;
                }

                // تحديث النماذج المخزنة
                cachedModels = data.data;
                try {
                    localStorage.setItem('cachedModels', JSON.stringify(cachedModels));
                } catch (e) {}

                grid.innerHTML = data.data.map((model, index) => `
                    <div class="model-card" data-aos="fade-up" data-aos-delay="${index * 50}">
                        <div class="model-icon">
                            <i class="fas fa-file-pdf"></i>
                        </div>
                        <h4>${model.title}</h4>
                        <p>${model.description || 'لا يوجد وصف'}</p>
                        <div class="model-meta">
                            <span class="category">${getCategoryLabel(model.category)}</span>
                            <span><i class="fas fa-weight-hanging"></i> ${model.fileSize}</span>
                        </div>
                        <div class="model-actions">
                            <button class="btn-download" onclick="downloadModel('${model._id}')">
                                <i class="fas fa-download"></i> تحميل
                            </button>
                            <button class="btn-view" onclick="viewModel('${model._id}')">
                                <i class="fas fa-eye"></i> عرض
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('خطأ في جلب النماذج:', error);
                grid.innerHTML = `
                    <div class="empty-models">
                        <i class="fas fa-exclamation-circle" style="color:#EF4444;"></i>
                        <p style="color:#EF4444;">❌ حدث خطأ في تحميل النماذج</p>
                    </div>
                `;
            }
        }

        // ============================================================
        // تحميل نموذج
        // ============================================================
        async function downloadModel(id) {
            try {
                const response = await fetch(`http://localhost:5000/api/models/${id}`);
                const data = await response.json();
                if (data.success && data.data.fileData) {
                    const link = document.createElement('a');
                    link.href = data.data.fileData;
                    link.download = data.data.fileName || 'نموذج';
                    link.click();
                    showAlert('✅ بدء تحميل النموذج', 'success');
                } else {
                    showAlert('❌ تعذر تحميل النموذج', 'danger');
                }
            } catch (error) {
                console.error(error);
                showAlert('❌ حدث خطأ في تحميل النموذج', 'danger');
            }
        }

        // ============================================================
        // عرض نموذج
        // ============================================================
        async function viewModel(id) {
            try {
                const response = await fetch(`http://localhost:5000/api/models/${id}`);
                const data = await response.json();
                if (data.success && data.data.fileData) {
                    window.open(data.data.fileData, '_blank');
                } else {
                    showAlert('❌ تعذر عرض النموذج', 'danger');
                }
            } catch (error) {
                console.error(error);
                showAlert('❌ حدث خطأ في عرض النموذج', 'danger');
            }
        }

        // ============================================================
        // تحميل الطلبات
        // ============================================================
        async function loadOrders() {
            const ordersList = document.getElementById('ordersList');

            if (!currentToken) {
                ordersList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-lock"></i>
                        <h3>يرجى تسجيل الدخول</h3>
                        <p>قم بتسجيل الدخول لعرض طلباتك</p>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch('https://draseh-platform-1.onrender.com/api/orders', {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });

                const data = await response.json();

                if (!data.success || data.data.length === 0) {
                    ordersList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <h3>لا توجد طلبات</h3>
                            <p>قم بطلب خدمة من القسم أعلاه</p>
                        </div>
                    `;
                    document.getElementById('ordersCount').textContent = '0 طلب';
                    return;
                }

                allOrders = data.data;
                document.getElementById('ordersCount').textContent = allOrders.length + ' طلب';

                ordersList.innerHTML = allOrders.map(order => `
                    <div class="order-card" data-aos="fade-up">
                        <div class="order-header">
                            <div class="order-title">
                                <h4>${order.title}</h4>
                                <div class="order-sub">
                                    ${order.description ? order.description.substring(0, 80) + (order.description.length > 80 ? '...' : '') : 'لا يوجد وصف'}
                                </div>
                            </div>
                            <span class="status status-${order.status}">${getStatusText(order.status)}</span>
                        </div>
                        <div class="order-body">
                            <span><i class="fas fa-tag"></i> ${order.serviceType || 'خدمة'}</span>
                            <span><i class="fas fa-calendar"></i> التسليم: ${order.deadline ? new Date(order.deadline).toLocaleDateString('ar-SA') : 'غير محدد'}</span>
                            ${order.budget ? `<span><i class="fas fa-money-bill"></i> ${order.budget} ريال</span>` : ''}
                        </div>
                        ${order.files && order.files.length > 0 ? `
                            <div class="order-files">
                                <i class="fas fa-paperclip"></i> الملفات: ${order.files.map(f => f.filename || 'ملف').join(', ')}
                            </div>
                        ` : ''}
                        <div class="order-footer">
                            <span class="order-meta">
                                <i class="fas fa-clock"></i> ${new Date(order.createdAt).toLocaleDateString('ar-SA')}
                            </span>
                            <div class="order-actions">
                                <button onclick="uploadFiles('${order._id}')" class="btn-upload">
                                    <i class="fas fa-upload"></i> رفع ملفات
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');

                updateStats();
            } catch (error) {
                console.error(error);
                ordersList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="color:#EF4444;"></i>
                        <h3>حدث خطأ</h3>
                        <p>تعذر تحميل الطلبات</p>
                    </div>
                `;
            }
        }

        // ============================================================
        // تحديث الإحصائيات
        // ============================================================
        function updateStats() {
            const total = allOrders.length;
            const pending = allOrders.filter(o => o.status === 'pending').length;
            const completed = allOrders.filter(o => o.status === 'completed').length;

            document.getElementById('totalOrdersStat').textContent = total;
            document.getElementById('pendingOrdersStat').textContent = pending;
            document.getElementById('completedOrdersStat').textContent = completed;
        }

        // ============================================================
        // رفع الملفات
        // ============================================================
        async function uploadFiles(orderId) {
            const input = document.createElement('input');
            input.type = 'file';
            input.multiple = true;
            input.accept = '.pdf,.doc,.docx,.xls,.xlsx,.txt,.jpg,.png,.zip,.rar';

            input.onchange = async function() {
                const files = this.files;
                if (files.length === 0) return;

                const formData = new FormData();
                for (let i = 0; i < files.length; i++) {
                    formData.append('files', files[i]);
                }

                try {
                    const response = await fetch(`http://localhost:5000/api/orders/${orderId}/upload`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${currentToken}`
                        },
                        body: formData
                    });

                    const data = await response.json();

                    if (data.success) {
                        showAlert(`✅ تم رفع ${files.length} ملف بنجاح!`, 'success');
                        loadOrders();
                    } else {
                        showAlert('❌ خطأ: ' + (data.message || 'غير معروف'), 'danger');
                    }
                } catch (error) {
                    console.error(error);
                    showAlert('❌ حدث خطأ في رفع الملفات', 'danger');
                }
            };

            input.click();
        }

        // ============================================================
        // دوال مساعدة
        // ============================================================
        function getStatusText(status) {
            const map = {
                'pending': '⏳ قيد الانتظار',
                'in-progress': '⚡ قيد التنفيذ',
                'completed': '✅ مكتمل',
                'revision': '🔄 مراجعة',
                'cancelled': '❌ ملغي'
            };
            return map[status] || status;
        }

        // ============================================================
        // تحميل النماذج عند بدء التشغيل
        // ============================================================
        async function init() {
            await loadModels();
            console.log('📦 النماذج المحملة:', cachedModels);
            console.log('🔑 مفاتيح الخدمات المتوفرة:', SERVICES_DATA.map(s => s.id));
        }

        // ============================================================
        // جعل الدوال متاحة عالمياً للاستدعاء من أي مكان
        // ============================================================
        window.openModelsModal = openModelsModal;
        window.closeModelsModal = closeModelsModal;
        window.viewModelFromModal = viewModelFromModal;
        window.downloadModel = downloadModel;
        window.viewModel = viewModel;
        window.loadModels = loadModels;

        // ============================================================
        // تشغيل التطبيق
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            if (checkAuth()) {
                renderTabs();
                renderSubServices(currentServiceId);
                loadOrders();
                loadModelsForClient();
                init();
            }
        });
    </script>

</body>
</html>
