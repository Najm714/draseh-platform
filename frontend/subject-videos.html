<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 فيديوهات المادة - منصة ارتقاء</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- AOS Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        /* ============================================================
           المتغيرات - نفس ألوان الصفحة الرئيسية
           ============================================================ */
        :root {
            --primary: #7C3AED;
            --primary-dark: #6D28D9;
            --primary-light: #8B5CF6;
            --secondary: #EC4899;
            --secondary-dark: #DB2777;
            --accent: #F59E0B;
            --accent-light: #FBBF24;
            --dark: #0F172A;
            --dark-light: #1E293B;
            --light: #F8FAFC;
            --gray: #64748B;
            --white: #FFFFFF;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 20px 60px rgba(124, 58, 237, 0.2);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --radius: 20px;
            --bg-body: #F1F5F9;
            --bg-card: #FFFFFF;
            --text-color: #0F172A;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --gradient-main: linear-gradient(135deg, #7C3AED, #EC4899);
            --gradient-secondary: linear-gradient(135deg, #F59E0B, #EC4899);
            --gold: #F59E0B;
        }

        /* ============================================================
           وضع الظلام
           ============================================================ */
        [data-theme="dark"] {
            --bg-body: #0F172A;
            --bg-card: #1E293B;
            --text-color: #F1F5F9;
            --text-muted: #94A3B8;
            --border-color: #334155;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 20px 60px rgba(124, 58, 237, 0.3);
        }

        /* ============================================================
           الإعدادات العامة
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-body);
            color: var(--text-color);
            transition: var(--transition);
            direction: rtl;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ============================================================
           شريط التمرير المخصص
           ============================================================ */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-body);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gradient-main);
            border-radius: 10px;
        }

        /* ============================================================
           زر تبديل الوضع
           ============================================================ */
        .theme-toggle {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 999;
            background: var(--bg-card);
            color: var(--text-color);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--primary);
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(20deg);
            box-shadow: var(--shadow-hover);
            background: var(--gradient-main);
            color: #fff;
        }

        /* ============================================================
           زر العودة للأعلى
           ============================================================ */
        .back-to-top {
            position: fixed;
            bottom: 95px;
            left: 30px;
            z-index: 999;
            background: var(--gradient-main);
            color: #fff;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .back-to-top.visible {
            display: flex;
        }

        .back-to-top:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: var(--shadow-hover);
        }

        /* ============================================================
           رأس المادة - تصميم جديد
           ============================================================ */
        .subject-header {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 30px 35px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .subject-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-main);
        }

        .subject-header .info {
            flex: 1;
        }

        .subject-header .info .breadcrumb {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .subject-header .info .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
        }

        .subject-header .info .breadcrumb a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .subject-header .info .breadcrumb .separator {
            opacity: 0.4;
        }

        .subject-header .info h1 {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .subject-header .info h1 span {
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subject-header .info .meta {
            display: flex;
            gap: 15px;
            color: var(--text-muted);
            font-size: 0.95rem;
            flex-wrap: wrap;
        }

        .subject-header .info .meta .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .subject-header .info .meta .badge.code {
            background: rgba(124, 58, 237, 0.1);
            color: var(--primary);
        }

        .subject-header .info .meta .badge.specialty {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent);
        }

        .subject-header .info .meta .badge.videos {
            background: rgba(236, 72, 153, 0.1);
            color: var(--secondary);
        }

        .subject-header .info .meta .badge i {
            font-size: 0.9rem;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-body);
            color: var(--text-color);
            padding: 10px 22px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            border: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .btn-back:hover {
            background: var(--gradient-main);
            color: #fff;
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .btn-back i {
            font-size: 0.9rem;
        }

        /* ============================================================
           الفلتر والبحث
           ============================================================ */
        .filter-section {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 18px 25px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            border: 1px solid var(--border-color);
        }

        .filter-section .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-body);
            border-radius: 50px;
            padding: 5px 18px;
            flex: 1;
            min-width: 200px;
            border: 2px solid transparent;
            transition: var(--transition);
        }

        .filter-section .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        }

        .filter-section .search-box i {
            color: var(--text-muted);
            margin-left: 10px;
        }

        .filter-section .search-box input {
            border: none;
            background: transparent;
            padding: 10px 0;
            width: 100%;
            font-size: 0.95rem;
            outline: none;
            font-family: 'Cairo', sans-serif;
            color: var(--text-color);
        }

        .filter-section .search-box input::placeholder {
            color: var(--text-muted);
        }

        .filter-section .sort-select {
            padding: 10px 18px;
            border: 2px solid var(--border-color);
            border-radius: 50px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            background: var(--bg-body);
            color: var(--text-color);
            transition: var(--transition);
            cursor: pointer;
        }

        .filter-section .sort-select:focus {
            border-color: var(--primary);
            outline: none;
        }

        /* ============================================================
           قائمة الفيديوهات - تصميم جديد
           ============================================================ */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .video-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 25px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .video-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-main);
        }

        .video-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-light);
        }

        .video-card .video-thumbnail {
            width: 100%;
            height: 160px;
            background: var(--gradient-main);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }

        .video-card .video-thumbnail .play-icon {
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.8);
            transition: var(--transition);
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .video-card .video-thumbnail .duration-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .video-card:hover .video-thumbnail .play-icon {
            transform: scale(1.1);
            color: #fff;
        }

        .video-card .video-thumbnail .video-number {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(124, 58, 237, 0.8);
            color: #fff;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .video-card .video-content h4 {
            color: var(--text-color);
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .video-card .video-content p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-card .video-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            flex-wrap: wrap;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .video-card .video-meta .views {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .video-card .video-meta .views i {
            color: var(--primary);
        }

        .video-card .video-meta .date {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .video-card .video-meta .date i {
            color: var(--text-muted);
        }

        .video-card .video-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .video-card .video-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .video-card .video-actions .btn-play {
            background: var(--gradient-main);
            color: #fff;
        }

        .video-card .video-actions .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
        }

        .video-card .video-actions .btn-play i {
            font-size: 0.9rem;
        }

        /* ============================================================
           حالات فارغة
           ============================================================ */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--text-muted);
            opacity: 0.2;
            margin-bottom: 20px;
            display: block;
        }

        .empty-state h3 {
            color: var(--text-color);
            margin-bottom: 8px;
            font-size: 1.3rem;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .empty-state .empty-actions {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .empty-state .empty-actions .btn-empty {
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .empty-state .empty-actions .btn-empty.primary {
            background: var(--gradient-main);
            color: #fff;
        }

        .empty-state .empty-actions .btn-empty.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
        }

        .empty-state .empty-actions .btn-empty.secondary {
            background: var(--bg-body);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .empty-state .empty-actions .btn-empty.secondary:hover {
            background: var(--border-color);
            transform: translateY(-2px);
        }

        .loading-text {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        .loading-text i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .loading-text p {
            font-size: 1.1rem;
        }

        /* ============================================================
           رسائل التنبيه
           ============================================================ */
        .alert {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
            animation: slideDown 0.4s ease;
        }

        .alert-success {
            background: #D1FAE5;
            color: #065F46;
            border: 1px solid #A7F3D0;
        }

        .alert-danger {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FCA5A5;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============================================================
           التجاوب
           ============================================================ */
        @media (max-width: 768px) {
            .subject-header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
                padding: 20px 22px;
            }

            .subject-header .info .breadcrumb {
                justify-content: center;
            }

            .subject-header .info .meta {
                justify-content: center;
            }

            .subject-header .info h1 {
                font-size: 1.7rem;
            }

            .btn-back {
                justify-content: center;
            }

            .filter-section {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-section .search-box {
                min-width: auto;
            }

            .videos-grid {
                grid-template-columns: 1fr;
            }

            .video-card .video-thumbnail {
                height: 120px;
            }

            .video-card .video-thumbnail .play-icon {
                font-size: 3rem;
            }

            .theme-toggle,
            .back-to-top {
                width: 45px;
                height: 45px;
                font-size: 1.2rem;
                bottom: 20px;
                left: 20px;
            }
            .back-to-top {
                bottom: 75px;
            }
        }

        @media (max-width: 480px) {
            .subject-header {
                padding: 15px 16px;
            }

            .subject-header .info h1 {
                font-size: 1.4rem;
            }

            .subject-header .info .meta .badge {
                font-size: 0.75rem;
                padding: 3px 10px;
            }

            .video-card {
                padding: 18px;
            }

            .video-card .video-thumbnail {
                height: 100px;
            }

            .video-card .video-actions button {
                font-size: 0.8rem;
                padding: 8px;
            }

            .empty-state i {
                font-size: 3rem;
            }

            .empty-state h3 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <!-- ====== زر تبديل الوضع ====== -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="تبديل الوضع">
        <i class="fas fa-moon"></i>
    </button>

    <!-- ====== زر العودة للأعلى ====== -->
    <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <i class="fas fa-chevron-up"></i>
    </button>

    <div class="container">

        <!-- ============================================================
        رأس المادة
        ============================================================ -->
        <div class="subject-header" data-aos="fade-up">
            <div class="info">
                <div class="breadcrumb">
                    <a href="explanations.html">📚 الشروحات</a>
                    <span class="separator">›</span>
                    <a href="explanations.html" id="breadcrumbSpecialty">التخصص</a>
                    <span class="separator">›</span>
                    <span id="breadcrumbSubject" style="color: var(--text-color); font-weight: 700;">المادة</span>
                </div>
                <h1><span id="subjectTitle">عنوان المادة</span></h1>
                <div class="meta">
                    <span class="badge code" id="subjectCode"><i class="fas fa-tag"></i> كود المادة</span>
                    <span class="badge specialty" id="subjectSpecialty"><i class="fas fa-graduation-cap"></i> التخصص</span>
                    <span class="badge videos" id="videosCount"><i class="fas fa-film"></i> 0 فيديو</span>
                </div>
            </div>
            <a href="explanations.html" class="btn-back">
                <i class="fas fa-arrow-right"></i> العودة للشروحات
            </a>
        </div>

        <!-- رسائل التنبيه -->
        <div id="alertMessage" class="alert"></div>

        <!-- ============================================================
        الفلتر والبحث
        ============================================================ -->
        <div class="filter-section" data-aos="fade-up" data-aos-delay="100">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="ابحث عن فيديو..." oninput="filterVideos()">
            </div>
            <select class="sort-select" id="sortSelect" onchange="filterVideos()">
                <option value="newest">📅 الأحدث</option>
                <option value="oldest">📅 الأقدم</option>
                <option value="most-viewed">👁️ الأكثر مشاهدة</option>
            </select>
        </div>

        <!-- ============================================================
        قائمة الفيديوهات
        ============================================================ -->
        <div class="videos-grid" id="videosGrid">
            <div class="loading-text">
                <i class="fas fa-spinner fa-spin"></i>
                <p>جاري تحميل الفيديوهات...</p>
            </div>
        </div>

    </div>

    <!-- ============================================================
    ====== جافا سكريبت ======
    ============================================================ -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js">
    </script>
    <script>
        // ============================================================
        // تعريف الرابط الأساسي للـ API حسب البيئة - ✅ الإصلاح الرئيسي
        // ============================================================
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000' 
            : 'https://draseh-platform-1.onrender.com';

        console.log('🌐 API_URL:', API_URL);

        // ============================================================
        // تفعيل AOS
        // ============================================================
        AOS.init({
            duration: 600,
            once: true,
            offset: 50
        });

        // ============================================================
        // تبديل الوضع (Dark/Light)
        // ============================================================
        let isDark = false;

        function toggleTheme() {
            isDark = !isDark;
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            const icon = document.querySelector('.theme-toggle i');
            icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'dark') {
            isDark = true;
            document.documentElement.setAttribute('data-theme', 'dark');
            document.querySelector('.theme-toggle i').className = 'fas fa-sun';
        }

        // ============================================================
        // زر العودة للأعلى
        // ============================================================
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            if (window.scrollY > 500) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        });

        // ============================================================
        // المتغيرات
        // ============================================================
        let allVideos = [];
        let currentSubjectId = null;
        let currentSubjectTitle = '';
        let currentSubjectCode = '';
        let currentSubjectSpecialty = '';

        // ============================================================
        // تحميل بيانات المادة من URL
        // ============================================================
        function loadSubjectFromURL() {
            const params = new URLSearchParams(window.location.search);
            currentSubjectId = params.get('id');
            currentSubjectTitle = decodeURIComponent(params.get('title') || 'المادة');
            currentSubjectCode = decodeURIComponent(params.get('code') || '');
            currentSubjectSpecialty = decodeURIComponent(params.get('specialty') || '');

            // تحديث رأس المادة
            document.getElementById('subjectTitle').textContent = currentSubjectTitle;
            document.getElementById('subjectCode').textContent = currentSubjectCode || 'بدون كود';
            document.getElementById('subjectSpecialty').textContent = currentSubjectSpecialty || 'تخصص غير محدد';
            document.getElementById('breadcrumbSubject').textContent = currentSubjectTitle;
            document.getElementById('breadcrumbSpecialty').textContent = currentSubjectSpecialty || 'التخصص';

            // تحديث عنوان الصفحة
            document.title = `🎬 ${currentSubjectTitle} - منصة ارتقاء`;
        }

        // ============================================================
        // عرض رسائل التنبيه
        // ============================================================
        function showAlert(message, type = 'success') {
            const alertEl = document.getElementById('alertMessage');
            alertEl.textContent = message;
            alertEl.className = `alert alert-${type} show`;
            setTimeout(() => {
                alertEl.classList.remove('show');
            }, 5000);
        }

        // ============================================================
        // جلب فيديوهات المادة - ✅ استخدام API_URL
        // ============================================================
        async function loadVideos() {
            const grid = document.getElementById('videosGrid');
            const countEl = document.getElementById('videosCount');

            if (!currentSubjectId) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="color:#EF4444;"></i>
                        <h3 style="color:#EF4444;">لم يتم تحديد المادة</h3>
                        <p>يرجى العودة إلى صفحة الشروحات واختيار مادة</p>
                        <div class="empty-actions">
                            <a href="explanations.html" class="btn-empty primary">
                                <i class="fas fa-arrow-right"></i> العودة للشروحات
                            </a>
                        </div>
                    </div>
                `;
                return;
            }

            try {
                console.log(`🔍 جاري تحميل فيديوهات المادة: ${currentSubjectId}`);
                
                // ✅ استخدام API_URL
                const response = await fetch(`${API_URL}/api/videos/subject/${currentSubjectId}`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('المادة غير موجودة');
                    }
                    throw new Error(`خطأ في الخادم: ${response.status}`);
                }

                const data = await response.json();
                console.log('📦 بيانات الفيديوهات:', data);

                countEl.textContent = `${data.count || 0} فيديو`;

                if (!data.success || data.data.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-video"></i>
                            <h3>لا توجد فيديوهات</h3>
                            <p>لم يتم رفع أي فيديو لهذه المادة حتى الآن</p>
                            <div class="empty-actions">
                                <a href="explanations.html" class="btn-empty primary">
                                    <i class="fas fa-arrow-right"></i> العودة للشروحات
                                </a>
                            </div>
                        </div>
                    `;
                    return;
                }

                allVideos = data.data;
                renderVideos(allVideos);

            } catch (error) {
                console.error('❌ خطأ في جلب الفيديوهات:', error);
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="color:#EF4444;"></i>
                        <h3 style="color:#EF4444;">حدث خطأ</h3>
                        <p>${error.message || 'تعذر تحميل الفيديوهات'}</p>
                        <div class="empty-actions">
                            <button onclick="loadVideos()" class="btn-empty primary">
                                <i class="fas fa-redo"></i> إعادة المحاولة
                            </button>
                            <a href="explanations.html" class="btn-empty secondary">
                                <i class="fas fa-arrow-right"></i> العودة للشروحات
                            </a>
                        </div>
                    </div>
                `;
            }
        }

        // ============================================================
        // عرض الفيديوهات
        // ============================================================
        function renderVideos(videos) {
            const grid = document.getElementById('videosGrid');

            if (videos.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>لا توجد نتائج</h3>
                        <p>لم يتم العثور على فيديوهات تطابق بحثك</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = videos.map((video, index) => `
                <div class="video-card" data-aos="fade-up" data-aos-delay="${Math.min(index * 50, 300)}">
                    <div class="video-thumbnail">
                        <i class="fas fa-play-circle play-icon"></i>
                        <span class="video-number">فيديو ${index + 1}</span>
                        <span class="duration-badge"><i class="fas fa-clock"></i> ${video.duration || 'غير محدد'}</span>
                    </div>
                    <div class="video-content">
                        <h4>${video.title}</h4>
                        <p>${video.description || 'لا يوجد وصف للفيديو'}</p>
                    </div>
                    <div class="video-meta">
                        <span class="views"><i class="fas fa-eye"></i> ${video.views || 0}</span>
                        <span class="date"><i class="fas fa-calendar-alt"></i> ${video.uploadDate ? new Date(video.uploadDate).toLocaleDateString('ar-SA') : '-'}</span>
                        <span><i class="fas fa-weight-hanging"></i> ${video.fileSize || 'غير محدد'}</span>
                    </div>
                    <div class="video-actions">
                        <button class="btn-play" onclick="playVideo('${video._id}')">
                            <i class="fas fa-play"></i> تشغيل
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ============================================================
        // فلترة الفيديوهات
        // ============================================================
        function filterVideos() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const sortBy = document.getElementById('sortSelect').value;

            let filtered = [...allVideos];

            // فلترة حسب البحث
            if (searchTerm) {
                filtered = filtered.filter(video =>
                    video.title.toLowerCase().includes(searchTerm) ||
                    (video.description && video.description.toLowerCase().includes(searchTerm))
                );
            }

            // ترتيب حسب الخيار المختار
            switch (sortBy) {
                case 'newest':
                    filtered.sort((a, b) => new Date(b.uploadDate) - new Date(a.uploadDate));
                    break;
                case 'oldest':
                    filtered.sort((a, b) => new Date(a.uploadDate) - new Date(b.uploadDate));
                    break;
                case 'most-viewed':
                    filtered.sort((a, b) => (b.views || 0) - (a.views || 0));
                    break;
                default:
                    break;
            }

            renderVideos(filtered);
        }

        // ============================================================
        // تشغيل الفيديو
        // ============================================================
        function playVideo(videoId) {
            window.location.href = `video-player.html?id=${videoId}`;
        }

        // ============================================================
        // تشغيل التطبيق
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🎬 تم تحميل صفحة فيديوهات المادة');
            console.log('🌐 API_URL:', API_URL);
            loadSubjectFromURL();
            loadVideos();
        });
    </script>

</body>
</html>
